{% extends "base.html" %}
{% block head %}
<style>
    .display-wrapper {
        width: 100%; height: 100%;
        display: flex; align-items: center; justify-content: flex-start; /* 左对齐 */
        position: relative;
        overflow: hidden;
        padding-left: 8%;
        background-color: #f3f0e9;
        transition: background-color 0.8s ease;
    }

    /* 左侧信息区 */
    .left-info {
        z-index: 10; text-align: left; width: 350px;
    }
    .left-info h2 { font-size: 4.5rem; font-family: 'Ma Shan Zheng', serif; color: #4a4a4a; margin-bottom: 15px; }
    .left-info p { font-size: 1.2rem; color: #666; line-height: 1.6; margin-bottom: 25px; }
    .left-info .btn { background: #a68a7a; color: white; border: none; padding: 12px 40px; }

    /* ========== 【修改点 1】扩大右侧整体容器 ========== */
    .wheel-wrapper {
        position: absolute;
        right: -8%; top: 50%; transform: translateY(-50%);
        width: 800px; height: 800px; /* 从 700px 扩大到 800px */
        display: flex; justify-content: center; align-items: center;
    }

    /* 外圈胶片带 */
    .film-ring {
        position: absolute; width: 100%; height: 100%;
        border-radius: 50%;
        background: transparent;
        border: 6px dashed rgba(200, 200, 195, 0.3);
    }

    /* 内部轨道容器 */
    .track-2d {
        position: relative; width: 80%; height: 80%;
        border-radius: 50%;
        transition: transform 1s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* ========== 【修改点 2】放大卡片尺寸 ========== */
    .term-card-2d {
        position: absolute; top: 50%; left: 50%;
        width: 130px; height: 150px; /* 从 90x100 扩大到 130x150 */
        margin-left: -65px; margin-top: -75px;
        background: #fff; border-radius: 16px; /* 圆角略微放大 */
        border: 2px solid rgba(255,255,255,0.8);
        box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        text-decoration: none; color: #333;
        transform-origin: center center;
    }
    .term-card-2d img {
        width: 65%; height: auto; margin-bottom: 5px; /* 图片比例适配新尺寸 */
    }
    .term-card-2d span { font-size: 14px; font-weight: bold; }

    .term-card-2d:hover { z-index: 20; background: #fff; box-shadow: 0 15px 35px rgba(0,0,0,0.15); }

    /* 高亮卡片 - 移动到中心位置 */
    .term-card-2d.active {
        border: 2px solid #a68a7a;
        box-shadow: 0 0 40px rgba(166, 138, 122, 0.5);
        z-index: 15;
    }
    .term-card-2d.inactive {
        opacity: 0.5;
        filter: grayscale(0.3);
    }
</style>
{% endblock %}

{% block content %}
<section class="snap-section">
    <div class="display-wrapper" id="displayWrapper">
        <!-- 左侧信息区 -->
        <div class="left-info">
            <p style="color: #888; letter-spacing: 2px;">SELECT THE CIRCLE</p>
            <h2 id="activeTermName">春分</h2>
            <p id="activeTermDesc">昼夜平分，草长莺飞。</p>
            <a href="#" id="exploreBtn" class="btn">了解详情 →</a>
        </div>

        <!-- 右侧 2D 胶片饼图 -->
        <div class="wheel-wrapper" id="wheelContainer">
            <!-- 外围胶片齿孔轨道 (纯装饰) -->
            <div class="film-ring"></div>
            <!-- 内部卡片轨道 -->
            <div class="track-2d" id="track2D">
                {% for term in terms %}
                <a href="/culture/{{ term.id }}" class="term-card-2d"
                   data-id="{{ term.id }}" data-name="{{ term.name }}"
                   data-desc="{{ term.desc }}" data-index="{{ loop.index0 }}">
                    <img src="{{ url_for('static', filename='images/' + term.image) }}"
                         alt="{{ term.name }}"
                         onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <span>{{ term.name }}</span>
                </a>
                {% endfor %}
            </div>
        </div>
    </div>
</section>

<script>
    const cards = document.querySelectorAll('.term-card-2d');
    const totalCards = cards.length;
    const track = document.getElementById('track2D');
    const wrapper = document.getElementById('displayWrapper');
    const activeName = document.getElementById('activeTermName');
    const activeDesc = document.getElementById('activeTermDesc');
    const exploreBtn = document.getElementById('exploreBtn');

    let currentIndex = 0;
    // 每次滚轮滚动旋转的卡片数量（增大角度步进）
    const scrollStep = 3; // 每次滚动移动3个卡片（15度 * 3 = 45度）

    function updateWheel(index) {
        const radius = 260;
        const angleStep = 360 / totalCards;
        const activeCard = cards[index];

        // 更新左侧UI
        activeName.innerText = activeCard.dataset.name;
        activeDesc.innerText = activeCard.dataset.desc;
        exploreBtn.href = activeCard.href;

        // 计算轨道旋转角度（选中卡片应该位于顶部位置，即-90度的位置）
        const targetAngleForSelected = -90;
        const currentCardAngle = index * angleStep;
        const rotateAngle = targetAngleForSelected - currentCardAngle;
        
        // 轨道容器保持静止
        track.style.transform = `rotate(0deg)`;

        cards.forEach((card, i) => {
            // 计算卡片在圆环上的原始角度
            const baseAngle = i * angleStep + rotateAngle;
            const radian = baseAngle * Math.PI / 180;

            // 计算圆上的 x, y 坐标
            const x = Math.cos(radian) * radius;
            const y = Math.sin(radian) * radius;

            // 高亮逻辑
            card.classList.remove('active', 'inactive');
            
            if (i === index) {
                // 选中卡片：移动到中心位置，放大显示，保持竖直
                card.style.transform = `translate(0px, 0px) rotate(0deg) scale(1.3)`;
                card.classList.add('active');
            } else {
                // 其他卡片：保持在圆环位置，反向旋转保持竖直
                // 反向旋转角度 = -baseAngle，抵消轨道角度让卡片保持竖直
                const counterRotation = -baseAngle;
                card.style.transform = `translate(${x}px, ${y}px) rotate(${counterRotation}deg)`;
                card.classList.add('inactive');
            }
            
            card.style.transformOrigin = 'center center';
        });
    }

    // 监听 2D 饼图区域的滚轮
    document.getElementById('wheelContainer').addEventListener('wheel', function(e) {
        e.stopPropagation();
        e.preventDefault();
        if (e.deltaY > 0) {
            // 向下滚动：增加索引（顺时针方向）
            currentIndex = (currentIndex + scrollStep) % totalCards;
        } else {
            // 向上滚动：减少索引（逆时针方向）
            currentIndex = (currentIndex - scrollStep + totalCards) % totalCards;
        }
        updateWheel(currentIndex);
    });

    // 初始化
    updateWheel(0);
</script>
{% endblock %}
