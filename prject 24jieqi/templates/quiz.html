{% extends "base.html" %}
{% block head %}
<style>
    .quiz-container {
        width: 80%;
        max-width: 800px;
        margin: 0 auto;
    }
    .question-card {
        background: rgba(255,255,255,0.85);
        border-radius: 20px;
        padding: 30px;
        margin-bottom: 25px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        border: 2px solid #e8dcc8;
    }
    .question-number {
        background: #a68a7a;
        color: white;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        margin-bottom: 20px;
    }
    .question-text {
        font-size: 1.3rem;
        color: #4a4a4a;
        margin-bottom: 25px;
        line-height: 1.6;
        font-family: 'Ma Shan Zheng', serif;
    }
    .options-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
    }
    .option-btn {
        padding: 15px 20px;
        background: rgba(166,138,122,0.1);
        border: 2px solid #d4c4b0;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
        font-size: 1rem;
        color: #5a5a5a;
        text-align: left;
    }
    .option-btn:hover {
        background: rgba(166,138,122,0.2);
        border-color: #a68a7a;
        transform: translateY(-2px);
    }
    .option-btn.selected {
        background: #a68a7a;
        border-color: #a68a7a;
        color: white;
    }
    .option-btn.correct {
        background: #7cb342;
        border-color: #7cb342;
        color: white;
    }
    .option-btn.wrong {
        background: #e53935;
        border-color: #e53935;
        color: white;
    }
    .result-area {
        margin-top: 25px;
        padding: 20px;
        border-radius: 12px;
        display: none;
    }
    .result-area.show {
        display: block;
    }
    .result-area.correct {
        background: rgba(124,179,66,0.15);
        border: 1px solid #7cb342;
    }
    .result-area.wrong {
        background: rgba(229,57,53,0.15);
        border: 1px solid #e53935;
    }
    .result-text {
        font-size: 1.1rem;
        color: #4a4a4a;
    }
    .quiz-progress {
        width: 100%;
        height: 8px;
        background: rgba(166,138,122,0.2);
        border-radius: 4px;
        margin-bottom: 30px;
        overflow: hidden;
    }
    .progress-bar {
        height: 100%;
        background: linear-gradient(90deg, #a68a7a, #c9a96e);
        border-radius: 4px;
        transition: width 0.5s ease;
    }
    .quiz-stats {
        display: flex;
        justify-content: space-between;
        margin-bottom: 20px;
        font-size: 0.95rem;
        color: #666;
    }
    .final-result {
        text-align: center;
        padding: 40px;
        background: rgba(255,255,255,0.9);
        border-radius: 20px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    }
    .final-score {
        font-size: 3rem;
        font-weight: bold;
        color: #a68a7a;
        margin: 20px 0;
        font-family: 'Ma Shan Zheng', serif;
    }
    .final-comment {
        font-size: 1.2rem;
        color: #5a5a5a;
        margin-bottom: 30px;
    }
    .restart-btn {
        background: #a68a7a;
        color: white;
        border: none;
        padding: 12px 40px;
        border-radius: 25px;
        font-size: 1.1rem;
        cursor: pointer;
        transition: all 0.3s ease;
    }
    .restart-btn:hover {
        background: #91735e;
        transform: translateY(-2px);
    }
</style>
{% endblock %}
{% block content %}
<section class="snap-section">
    <h2 style="font-family: 'Ma Shan Zheng', serif; font-size: 2.2rem; margin-bottom: 30px; color: #4a4a4a; letter-spacing: 3px;">趣味问答</h2>
    
    <div class="quiz-container" id="quiz-container">
        <div class="quiz-stats">
            <span>题目 <span id="current-num">1</span> / <span id="total-num">5</span></span>
            <span>得分: <span id="score">0</span></span>
        </div>
        
        <div class="quiz-progress">
            <div class="progress-bar" id="progress-bar" style="width: 20%;"></div>
        </div>
        
        <div id="questions-container"></div>
        
        <div id="final-result" class="final-result" style="display: none;">
            <h3 style="font-family: 'Ma Shan Zheng', serif; font-size: 1.8rem; color: #4a4a4a;">挑战完成！</h3>
            <div class="final-score" id="final-score">0/5</div>
            <div class="final-comment" id="final-comment"></div>
            <button class="restart-btn" onclick="restartQuiz()">再来一次</button>
        </div>
    </div>
</section>

<script>
    const questions = [
        {
            id: 1,
            question: "以下哪个节气标志着春天的开始？",
            options: ["雨水", "立春", "惊蛰", "春分"],
            answer: 1,
            explanation: "立春是二十四节气中的第一个节气，标志着春天的正式开始。"
        },
        {
            id: 2,
            question: "\"清明时节雨纷纷\"描述的是哪个节气的景象？",
            options: ["谷雨", "清明", "雨水", "惊蛰"],
            answer: 1,
            explanation: "清明是春季的第五个节气，通常在每年4月4日或5日，此时天气转暖，降雨增多。"
        },
        {
            id: 3,
            question: "哪个节气表示炎热天气的开始？",
            options: ["小暑", "大暑", "立夏", "夏至"],
            answer: 0,
            explanation: "小暑是夏季的第五个节气，表示天气开始炎热，但还不是最热的时候。"
        },
        {
            id: 4,
            question: "秋收冬藏，哪个节气标志着秋天的开始？",
            options: ["处暑", "白露", "立秋", "秋分"],
            answer: 2,
            explanation: "立秋是秋季的第一个节气，标志着秋天的开始，但此时天气依然炎热。"
        },
        {
            id: 5,
            question: "冬至这一天，北半球的日照时间有什么特点？",
            options: ["最长", "最短", "适中", "不确定"],
            answer: 1,
            explanation: "冬至是北半球一年中白天最短、夜晚最长的一天，之后白天会逐渐变长。"
        }
    ];
    
    let currentQuestion = 0;
    let score = 0;
    let answered = false;
    
    function renderQuestion() {
        const q = questions[currentQuestion];
        const container = document.getElementById('questions-container');
        
        container.innerHTML = `
            <div class="question-card">
                <div class="question-number">${q.id}</div>
                <div class="question-text">${q.question}</div>
                <div class="options-grid">
                    ${q.options.map((opt, index) => `
                        <button class="option-btn" onclick="selectOption(${index})">${opt}</button>
                    `).join('')}
                </div>
                <div class="result-area" id="result-area">
                    <div class="result-text" id="result-text"></div>
                </div>
            </div>
        `;
        
        document.getElementById('current-num').textContent = currentQuestion + 1;
        document.getElementById('total-num').textContent = questions.length;
        document.getElementById('score').textContent = score;
        document.getElementById('progress-bar').style.width = `${((currentQuestion + 1) / questions.length) * 100}%`;
        answered = false;
    }
    
    function selectOption(index) {
        if (answered) return;
        answered = true;
        
        const q = questions[currentQuestion];
        const options = document.querySelectorAll('.option-btn');
        const resultArea = document.getElementById('result-area');
        const resultText = document.getElementById('result-text');
        
        options.forEach((opt, i) => {
            opt.disabled = true;
            if (i === q.answer) {
                opt.classList.add('correct');
            } else if (i === index && i !== q.answer) {
                opt.classList.add('wrong');
            }
        });
        
        if (index === q.answer) {
            score++;
            document.getElementById('score').textContent = score;
            resultArea.classList.add('correct');
            resultText.innerHTML = `<strong>回答正确！</strong><br>${q.explanation}`;
        } else {
            resultArea.classList.add('wrong');
            resultText.innerHTML = `<strong>回答错误！</strong><br>正确答案是：${q.options[q.answer]}<br>${q.explanation}`;
        }
        
        resultArea.classList.add('show');
        
        setTimeout(() => {
            currentQuestion++;
            if (currentQuestion < questions.length) {
                renderQuestion();
            } else {
                showFinalResult();
            }
        }, 2500);
    }
    
    function showFinalResult() {
        document.getElementById('questions-container').style.display = 'none';
        document.getElementById('final-result').style.display = 'block';
        document.getElementById('final-score').textContent = `${score}/${questions.length}`;
        
        let comment = "";
        if (score === questions.length) {
            comment = "太棒了！你是节气知识大师！";
        } else if (score >= questions.length * 0.8) {
            comment = "非常优秀！对节气文化了解很深！";
        } else if (score >= questions.length * 0.6) {
            comment = "不错哦！继续加油学习节气知识！";
        } else {
            comment = "还要多多了解二十四节气文化哦！";
        }
        document.getElementById('final-comment').textContent = comment;
    }
    
    function restartQuiz() {
        currentQuestion = 0;
        score = 0;
        document.getElementById('questions-container').style.display = 'block';
        document.getElementById('final-result').style.display = 'none';
        renderQuestion();
    }
    
    renderQuestion();
</script>
{% endblock %}
