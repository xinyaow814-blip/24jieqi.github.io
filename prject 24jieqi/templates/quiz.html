{% extends "base.html" %}
{% block head %}
<style>
    .quiz-wrapper {
        width: 90%;
        max-width: 720px;
        padding: 50px 60px;
        text-align: center;
    }
    .quiz-wrapper h2 {
        font-family: 'Ma Shan Zheng', serif;
        font-size: 2.4rem;
        color: #4a4a4a;
        margin-bottom: 10px;
        letter-spacing: 3px;
    }
    .quiz-subtitle {
        color: #888;
        margin-bottom: 30px;
        letter-spacing: 1px;
    }
    .quiz-question {
        font-size: 1.25rem;
        color: #444;
        margin-bottom: 25px;
        line-height: 1.7;
    }
    .quiz-options {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
        margin-bottom: 25px;
    }
    .quiz-option {
        padding: 14px 18px;
        background: rgba(255,255,255,0.6);
        border: 1px solid rgba(255,255,255,0.8);
        border-radius: 14px;
        cursor: pointer;
        transition: 0.25s;
        color: #555;
    }
    .quiz-option:hover {
        background: #a68a7a;
        color: #fff;
        transform: translateY(-2px);
    }
    .quiz-option.correct {
        background: #7fb78b;
        color: #fff;
        border-color: #7fb78b;
    }
    .quiz-option.wrong {
        background: #e08a8a;
        color: #fff;
        border-color: #e08a8a;
    }
    .quiz-result {
        font-size: 1.1rem;
        color: #a68a7a;
        min-height: 1.5em;
        margin-bottom: 10px;
    }
</style>
{% endblock %}
{% block content %}
<section class="snap-section">
    <div class="quiz-wrapper stamp-border">
        <h2>节气趣味问答</h2>
        <div class="quiz-subtitle">—— 测一测你的节气底蕴</div>
        <div class="quiz-question" id="quizQuestion">"清明时节雨纷纷" 出自哪位诗人的名句？</div>
        <div class="quiz-options" id="quizOptions">
            <div class="quiz-option" data-correct="false">李白</div>
            <div class="quiz-option" data-correct="true">杜牧</div>
            <div class="quiz-option" data-correct="false">白居易</div>
            <div class="quiz-option" data-correct="false">王维</div>
        </div>
        <div class="quiz-result" id="quizResult"></div>
        <a href="/interactive" class="btn" style="background:#ddd;color:#444;">← 返回互动</a>
    </div>
</section>
<script>
    const options = document.querySelectorAll('.quiz-option');
    const result = document.getElementById('quizResult');
    options.forEach(opt => {
        opt.addEventListener('click', () => {
            options.forEach(o => o.style.pointerEvents = 'none');
            if (opt.dataset.correct === 'true') {
                opt.classList.add('correct');
                result.innerText = '答对啦！你真是一位节气小达人。';
            } else {
                opt.classList.add('wrong');
                result.innerText = '差一点，再去了解一下节气小知识吧～';
                options.forEach(o => { if (o.dataset.correct === 'true') o.classList.add('correct'); });
            }
        });
    });
</script>
{% endblock %}
