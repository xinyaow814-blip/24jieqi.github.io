{% extends "base.html" %}
{% block content %}
<section class="snap-section" style="background: #f0f0ea; flex-direction: row; gap: 50px;">
    <div style="background: white; padding: 30px; border-radius: 30px; width: 400px;">
        <img src="{{ url_for('static', filename='images/' + item.image) }}"
             alt="{{ item.name }}"
             onerror="this.onerror=null; this.src='{{ url_for('static', filename='images/toy.png') }}'; this.alt='{{ item.name }} (占位图)';"
             style="width: 100%;">
    </div>
    <div style="max-width: 500px;">
        <a href="/shop" class="btn" style="background: #ddd; color: #444; margin-bottom: 20px; display: inline-block;">返回商城</a>
        <h1 style="font-size: 2.5rem; color: #333;">{{ item.name }}</h1>
        <p style="color: #666; margin: 20px 0; line-height: 1.6;">{{ item.desc }}</p>
        <div style="font-size: 2rem; font-weight: bold; color: #e44d26; margin-bottom: 30px;">¥ {{ item.price }}</div>
        <div style="display: flex; gap: 15px;">
            <button class="btn" style="flex: 1; background: #a68a7a;">加入购物车</button>
            <button class="btn" style="flex: 1; background: #f7a072;">立即支付</button>
        </div>
    </div>
</section>
{% endblock %}
