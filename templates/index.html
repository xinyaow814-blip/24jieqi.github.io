{% extends "base.html" %}
{% block content %}
<section class="snap-section">
    <div style="display: flex; flex-direction: column; align-items: center; text-align: center; max-width: 800px; gap: 20px;">
        <!-- 顶部装饰图/几何色块（模拟参考图 Frame 77 顶部抽象图） -->
        <div style="width: 300px; height: 120px; position: relative; margin-bottom: 20px;">
            <div style="position: absolute; top: 10px; left: 30px; width: 200px; height: 80px; background: #b3d1c6; border-radius: 100px/50px; filter: blur(5px); opacity: 0.8;"></div>
            <div style="position: absolute; bottom: 10px; right: 30px; width: 120px; height: 60px; background: #d4b8a7; border-radius: 100px/50px; filter: blur(5px); opacity: 0.8;"></div>
            <!-- 模拟毛笔笔触 -->
            <svg width="100" height="100" viewBox="0 0 100 100" style="position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 2;">
                <path d="M 20 70 Q 50 10 80 70" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>
            </svg>
        </div>

        <h1 style="font-family: 'Ma Shan Zheng', serif; font-size: 4.5rem; color: #3a3a3a; letter-spacing: 6px; text-shadow: 0 4px 15px rgba(255,255,255,0.5);">
            四时灵兽纪
        </h1>
        <p style="font-size: 1.2rem; color: #666; letter-spacing: 2px; max-width: 500px; line-height: 1.6; background: rgba(255,255,255,0.4); padding: 15px 25px; border-radius: 40px; backdrop-filter: blur(4px);">
            探寻二十四个节气背后的东方生灵之美
        </p>

        <a href="#display-section" class="btn" style="background: #a68a7a; color: white; border: none; padding: 15px 45px; font-size: 1.1rem; margin-top: 20px;">
            开启探索 ↓
        </a>
    </div>
</section>
{% endblock %}
